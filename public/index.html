<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do app</title>
</head>
<body>
    <div class="container">
        <h2 class="title">To-Do app with express.js</h2>
            <label for="task">Task:</label>
            <input type="text" id="task" placeholder="Enter a task">
            <button type="submit" id="btn">Submit</button>

            


            <ul id="taskList"></ul>
    </div>
    <script>
        const btn = document.getElementById("btn"); //getting button from doc

        const taskList = document.getElementById("taskList"); //getting ul from doc

        const tasks = [];

        btn.addEventListener('click', () =>{ //button listener function to add a task to the ul
            let task = document.getElementById("task"); //getting task input from doc
            let taskText = task.value; //setting the value of task to a new var

            let li = document.createElement("li"); //creating list element
            li.innerText = taskText; //setting the text of the list elements to task input

            taskList.appendChild(li); //add the list element to the ul
            
            // tasks.push(li);


            task.value = ""; //clear the input field 
            let removeBtn = document.createElement("button"); //create a remove button for each li

            removeBtn.type = "button";
            removeBtn.innerText = "Clear"; //adding text to the button

            li.appendChild(removeBtn); //adding the button to the li

            // tasks.forEach((tasks) => {
            //     let removeBtn = document.createElement("button");
            // })

            removeBtn.addEventListener('click', () => {
                taskList.removeChild(li);
            });
        });







    </script>
</body>
</html>
